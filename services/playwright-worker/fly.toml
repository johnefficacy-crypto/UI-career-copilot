app            = "career-copilot-playwright"
primary_region = "bom"

[build]

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "15s"
    method       = "GET"
    path         = "/health"

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
