<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Career Copilot · Admin UI Kit</title>
<link rel="stylesheet" href="kit.css" />
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="AdminShell.jsx"></script>
<script type="text/babel" src="AdminOverview.jsx"></script>
<script type="text/babel" src="RecruitmentsTable.jsx"></script>
<script type="text/babel" src="ScrapeDashboard.jsx"></script>
<script type="text/babel" src="SourceRegistry.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  function App() {
    const [view, setView] = useState(() => localStorage.getItem("cc-admin-view") || "overview");
    useEffect(() => { localStorage.setItem("cc-admin-view", view); });
    useEffect(() => {
      const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 50);
      return () => clearTimeout(t);
    });
    const screens = {
      overview: <AdminOverview />,
      recruits: <RecruitmentsTable />,
      scrape:   <ScrapeDashboard />,
      sources:  <SourceRegistry />,
      orgs:     <div style={{padding:40,color:"var(--text-muted)"}}>Organizations — not included in kit</div>,
      eligibility: <div style={{padding:40,color:"var(--text-muted)"}}>Eligibility — not included in kit</div>,
    };
    return (
      <div data-screen-label={view}>
        <AdminShell active={view} onGoTo={setView}>
          {screens[view] || screens.overview}
        </AdminShell>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
