<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Career Copilot · Aspirant UI Kit</title>
<link rel="stylesheet" href="kit.css" />
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="AppNav.jsx"></script>
<script type="text/babel" src="MarketingLanding.jsx"></script>
<script type="text/babel" src="DashboardShell.jsx"></script>
<script type="text/babel" src="NotificationsFeed.jsx"></script>
<script type="text/babel" src="ChatPane.jsx"></script>
<script type="text/babel" src="OnboardingStep.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect } = React;

  function App() {
    const [view, setView] = useState(() => localStorage.getItem("cc-aspirant-view") || "marketing");
    useEffect(() => { localStorage.setItem("cc-aspirant-view", view); }, [view]);
    useEffect(() => {
      const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 50);
      return () => clearTimeout(t);
    });
    const screens = {
      marketing:     <MarketingLanding   onGoTo={setView} />,
      onboarding:    <OnboardingStep     onGoTo={setView} />,
      dashboard:     <DashboardShell     onGoTo={setView} />,
      notifications: <NotificationsFeed  onGoTo={setView} />,
      chat:          <ChatPane           onGoTo={setView} />,
    };
    return (
      <div data-screen-label={view}>
        {screens[view] || screens.marketing}

        {/* floating route switcher — only visible on small screens / debug */}
        <div style={{
          position: "fixed", bottom: 16, right: 16, zIndex: 999,
          display: "flex", gap: 4, padding: 4,
          background: "rgba(15,15,15,0.90)", border: "1px solid var(--border)",
          borderRadius: 9999, backdropFilter: "blur(12px)",
          fontFamily: "var(--font-mono)", fontSize: 10
        }}>
          {["marketing","onboarding","dashboard","notifications","chat"].map(k => (
            <button key={k} onClick={() => setView(k)}
              style={{
                border: "none", cursor: "pointer", padding: "6px 10px", borderRadius: 9999,
                background: view === k ? "var(--gold)" : "transparent",
                color: view === k ? "#0c0c0c" : "rgba(255,255,255,0.55)",
                fontFamily: "inherit", fontSize: "inherit", textTransform: "uppercase", letterSpacing: "0.08em"
              }}>{k === "notifications" ? "notifs" : k === "marketing" ? "landing" : k}</button>
          ))}
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
