<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff}
.card{border-radius:24px;padding:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07)}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.40);margin-bottom:14px}
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
h3{margin:2px 0 0;font-family:'Playfair Display',serif;font-weight:500;font-size:16px;color:#fff}
.meta{font-size:11px;color:rgba(255,255,255,0.40)}
.sub{font-size:12px;color:rgba(255,255,255,0.40);margin-top:2px}
.badge{padding:4px 10px;border-radius:9999px;font-size:11px;background:rgba(245,158,11,0.10);border:1px solid rgba(245,158,11,0.20);color:#fcd34d;white-space:nowrap}
.bar{height:4px;background:rgba(255,255,255,0.07);border-radius:9999px;overflow:hidden;margin-top:10px}
.bar i{display:block;height:100%;width:66%;background:#f59e0b;border-radius:9999px}
.footer{display:flex;justify-content:space-between;margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:#fcd34d}
</style></head><body>
<div class="card">
  <div class="eyebrow">Exam targets</div>
  <div class="row">
    <div><div class="meta">Central · 2026</div><h3>RBI Grade B — Officer (General)</h3><div class="sub">Reserve Bank of India</div></div>
    <span class="badge">Closing soon</span>
  </div>
  <div style="font-size:11px;color:rgba(255,255,255,0.40)">Notified: <span style="color:rgba(255,255,255,0.65)">12 Aug</span> &nbsp; Deadline: <span style="color:rgba(255,255,255,0.65)">14 Oct</span></div>
  <div class="bar"><i></i></div>
  <div class="footer"><span>Progress</span><span>14d left</span></div>
</div>
</body></html>
