<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px}
.stat.accent{background:rgba(232,213,163,0.04);border-color:rgba(232,213,163,0.20)}
.lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.40);margin-bottom:6px}
.val{font-family:'Playfair Display',serif;font-weight:600;font-size:28px;line-height:1;color:#fff}
.val.accent{color:#e8d5a3}
.sub{font-size:11px;color:rgba(255,255,255,0.30);margin-top:4px}
</style></head><body>
<div class="stat"><div class="lbl">Exams targeted</div><div class="val">04</div><div class="sub">tracked</div></div>
<div class="stat accent"><div class="lbl">Eligible matches</div><div class="val accent">12</div><div class="sub">across open recruitments</div></div>
<div class="stat"><div class="lbl">Attempts used</div><div class="val">02</div><div class="sub">across exams</div></div>
<div class="stat"><div class="lbl">Education</div><div class="val">PG</div><div class="sub">M.Sc Economics</div></div>
</body></html>
