<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff}
.card{border:1px solid rgba(232,213,163,0.20);background:rgba(232,213,163,0.04);border-radius:20px;padding:18px}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:rgba(232,213,163,0.7);margin-bottom:10px}
.hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.status{padding:3px 10px;border-radius:9999px;background:rgba(16,185,129,0.10);border:1px solid rgba(16,185,129,0.20);color:#10b981;font-size:11px}
h3{margin:0;font-family:'Playfair Display',serif;font-weight:500;font-size:17px}
.row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px dashed rgba(255,255,255,0.08)}
.row:first-child{border-top:none}
.row span:first-child{color:rgba(255,255,255,0.5)}
.row span:last-child{color:#10b981;font-family:'DM Mono',monospace}
.row.fail span:last-child{color:#f87171}
</style></head><body>
<div class="card">
  <div class="eyebrow">Why you're eligible</div>
  <div class="hd"><h3>RBI Grade B — Officer (General)</h3><span class="status">Eligible</span></div>
  <div class="row"><span>Age · 26 (limit 21–30)</span><span>✓ passes</span></div>
  <div class="row"><span>Education · M.Sc Economics</span><span>✓ passes</span></div>
  <div class="row"><span>Category · OBC (reserved seat)</span><span>✓ passes</span></div>
  <div class="row"><span>Attempts · 2 used (limit 6)</span><span>✓ passes</span></div>
  <div class="row fail"><span>Domicile · Any (no restriction)</span><span style="color:rgba(255,255,255,0.4)">— not required</span></div>
</div>
</body></html>
