<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff;display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px}
.fld{display:flex;flex-direction:column;gap:6px}
label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5)}
input,select{width:100%;border-radius:20px;padding:12px 16px;font-size:14px;color:#fff;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.12);outline:none;font-family:inherit;box-sizing:border-box}
input:focus{background:rgba(255,255,255,0.05);border-color:rgba(232,213,163,0.40)}
input::placeholder{color:rgba(255,255,255,0.20)}
</style></head><body>
<div class="fld"><label>Full name *</label><input placeholder="Priya Sharma" value="Priya Sharma"></div>
<div class="fld"><label>Email *</label><input placeholder="you@email.com"></div>
<div class="fld"><label>Category</label><select><option>General</option><option>OBC</option></select></div>
<div class="fld"><label>State</label><select><option>Maharashtra</option></select></div>
</body></html>
