<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff;display:flex;gap:12px;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;border:none}
.primary{background:#e8d5a3;color:#0c0c0c}
.primary:hover{background:#f0dfa8}
.ghost{background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12)}
.ghost:hover{color:#fff;border-color:rgba(255,255,255,0.20)}
.link{background:none;color:rgba(255,255,255,0.25);font-size:14px;border:none}
.disabled{background:#e8d5a3;color:#0c0c0c;opacity:0.5;cursor:not-allowed}
</style></head><body>
<button class="btn primary">Start for free →</button>
<button class="btn ghost">See how it works</button>
<button class="btn disabled">Processing…</button>
<button class="btn link">← Back</button>
</body></html>
