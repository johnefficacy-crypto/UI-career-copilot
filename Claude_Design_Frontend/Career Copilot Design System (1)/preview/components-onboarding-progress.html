<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff}
.bar{display:flex;align-items:center;gap:12px;padding:0 0 14px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.step{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.35)}
.n{width:20px;height:20px;border-radius:9999px;border:1px solid rgba(255,255,255,0.15);display:grid;place-items:center;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4)}
.step.done .n{background:rgba(16,185,129,0.10);border-color:rgba(16,185,129,0.40);color:#10b981}
.step.now{color:#e8d5a3}
.step.now .n{background:rgba(232,213,163,0.08);border-color:rgba(232,213,163,0.5);color:#e8d5a3}
.sep{flex:1;height:1px;background:rgba(255,255,255,0.1);margin:0 2px}
.sep.done{background:rgba(16,185,129,0.4)}
</style></head><body>
<div class="bar">
  <div class="step done"><span class="n">✓</span>Identity</div>
  <div class="sep done"></div>
  <div class="step done"><span class="n">✓</span>Education</div>
  <div class="sep done"></div>
  <div class="step now"><span class="n">03</span>Experience</div>
  <div class="sep"></div>
  <div class="step"><span class="n">04</span>Attempts</div>
  <div class="sep"></div>
  <div class="step"><span class="n">05</span>Preferences</div>
</div>
<div style="font-family:'Playfair Display',serif;font-weight:500;font-size:24px;color:#fff;margin-top:10px">Work experience, if any</div>
<div style="font-size:14px;color:rgba(255,255,255,0.40);margin-top:4px">Relevant work exp boosts eligibility for certain PSU and banking posts.</div>
</body></html>
