<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff}
.filter{display:flex;gap:8px;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;align-items:center;flex-wrap:wrap}
input{flex:1;min-width:180px;background:transparent;border:none;outline:none;color:#fff;font-size:13px;padding:4px 8px;font-family:inherit}
.chip{padding:5px 10px;border-radius:9999px;font-size:11px;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);background:transparent;cursor:pointer;display:inline-flex;gap:4px;align-items:center}
.chip.active{background:rgba(232,213,163,0.08);border-color:rgba(232,213,163,0.4);color:#e8d5a3}
.x{color:rgba(255,255,255,0.35);font-size:10px;margin-left:2px}
</style></head><body>
<div class="filter">
  <input placeholder="Search recruitments, posts, orgs…" value="RBI">
  <span class="chip active">Central<span class="x">×</span></span>
  <span class="chip active">OBC<span class="x">×</span></span>
  <span class="chip">+ Category</span>
  <span class="chip">+ Deadline</span>
  <span class="chip">+ Min vacancies</span>
</div>
</body></html>
