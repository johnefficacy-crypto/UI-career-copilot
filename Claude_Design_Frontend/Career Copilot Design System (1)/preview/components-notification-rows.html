<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"><style>
body{padding:20px;font-family:'DM Sans',sans-serif;color:#fff}
.row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:14px;border:1px solid;margin-bottom:8px}
.dot{width:8px;height:8px;border-radius:9999px;margin-top:6px;flex-shrink:0}
.meta{font-size:11px;color:rgba(255,255,255,0.40);display:flex;gap:6px;margin-top:3px;flex-wrap:wrap}
.meta .sep{color:rgba(255,255,255,0.15)}
.tag{padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45)}
.title{font-size:14px;font-weight:500;color:rgba(255,255,255,0.88)}
.badge{margin-left:auto;padding:2px 8px;border-radius:9999px;font-size:10px;white-space:nowrap}
</style></head><body>
<div class="row" style="background:rgba(239,68,68,0.04);border-color:rgba(239,68,68,0.35)">
  <span class="dot" style="background:#ef4444"></span>
  <div style="flex:1">
    <div style="display:flex;gap:8px;align-items:center"><span class="title">SEBI Grade A — Officer (General)</span><span class="badge" style="background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.2)">1 day left</span></div>
    <div class="meta"><span>SEBI</span><span class="sep">·</span><span>Regulatory</span><span class="sep">·</span><span class="tag">Last day!</span></div>
  </div>
</div>
<div class="row" style="background:rgba(232,213,163,0.04);border-color:rgba(232,213,163,0.18)">
  <span class="dot" style="background:#e8d5a3"></span>
  <div style="flex:1">
    <div style="display:flex;gap:8px;align-items:center"><span class="title">UPSC CSE 2026 — Prelims notification</span><span class="badge" style="background:rgba(255,255,255,0.05);color:#10b981;border:1px solid rgba(16,185,129,0.2)">42d left</span></div>
    <div class="meta"><span>UPSC</span><span class="sep">·</span><span>Central</span><span class="sep">·</span><span class="tag">New opening</span></div>
  </div>
</div>
<div class="row" style="background:transparent;border-color:rgba(255,255,255,0.07)">
  <span class="dot" style="background:transparent"></span>
  <div style="flex:1">
    <div style="display:flex;gap:8px;align-items:center"><span class="title" style="color:rgba(255,255,255,0.45)">NABARD Grade A — vacancy update</span></div>
    <div class="meta"><span>NABARD</span><span class="sep">·</span><span class="tag">Vacancies updated</span></div>
  </div>
</div>
</body></html>
